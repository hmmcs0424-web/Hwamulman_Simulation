<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>화물맨 시뮬레이터</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--brand:#FFB800;--bg:#111;--topnav-h:54px;}

body{background:var(--bg);font-family:'Pretendard',-apple-system,sans-serif;color:#1a1a1a;overflow:hidden;height:100vh;}

/* ── TOP NAV ── */
.topnav{
  position:fixed;top:0;left:0;right:0;height:var(--topnav-h);
  background:#1a1a1a;border-bottom:1px solid #2e2e2e;
  display:flex;align-items:center;padding:0 20px;z-index:1000;gap:0;
}
.topnav-logo{font-size:15px;font-weight:800;color:#FFB800;letter-spacing:-.3px;margin-right:28px;white-space:nowrap;flex-shrink:0;}
.topnav-logo span{color:#fff;font-weight:400;font-size:13px;margin-left:4px;}
.topnav-menus{display:flex;gap:2px;flex:1;}
.nav-menu{
  padding:7px 16px;border-radius:8px;border:none;cursor:pointer;
  font-family:inherit;font-size:13px;font-weight:600;
  color:#aaa;background:transparent;transition:all .15s;white-space:nowrap;
}
.nav-menu:hover{color:#fff;background:#2a2a2a;}
.nav-menu.active{color:#FFB800;background:#2a2000;}
.topnav-right{display:flex;align-items:center;gap:10px;flex-shrink:0;margin-left:auto;}
.btn-admin-login{
  padding:7px 16px;border-radius:8px;border:1.5px solid #444;cursor:pointer;
  font-family:inherit;font-size:13px;font-weight:600;
  color:#ccc;background:transparent;transition:all .15s;display:flex;align-items:center;gap:5px;
}
.btn-admin-login:hover{border-color:#FFB800;color:#FFB800;}
.btn-admin-login.on{border-color:#FF5000;color:#FF5000;background:#1a0a00;}

/* ── MAIN LAYOUT ── */
.main-layout{
  display:flex;height:calc(100vh - var(--topnav-h));
  margin-top:var(--topnav-h);overflow:hidden;
}

/* ── PHONE FRAME ── */
.phone-area{
  display:flex;align-items:center;justify-content:center;
  padding:20px;width:33.33vw;flex-shrink:0;
}
.phone-frame{
  width:100%;max-width:380px;
  height:calc(100vh - var(--topnav-h) - 40px);max-height:860px;
  background:#1c1c1e;border-radius:52px;padding:14px;
  box-shadow:inset 0 0 0 1.5px #3a3a3c,0 0 0 1px #000,0 30px 80px rgba(0,0,0,.85);
  display:flex;flex-direction:column;position:relative;
}
.phone-frame::before{content:'';position:absolute;right:-3px;top:130px;width:3px;height:64px;background:#2c2c2e;border-radius:0 3px 3px 0;}
.phone-frame::after{content:'';position:absolute;left:-3px;top:90px;width:3px;height:36px;background:#2c2c2e;border-radius:3px 0 0 3px;box-shadow:0 52px 0 #2c2c2e,0 96px 0 #2c2c2e;}
.phone-inner{flex:1;background:#fff;border-radius:40px;overflow:hidden;display:flex;flex-direction:column;position:relative;}
.phone-island{position:absolute;top:11px;left:50%;transform:translateX(-50%);width:110px;height:30px;background:#1c1c1e;border-radius:20px;z-index:10;}
.status-bar{flex-shrink:0;height:50px;padding:16px 22px 0;display:flex;justify-content:space-between;align-items:center;position:relative;z-index:5;}
.status-time{font-size:15px;font-weight:700;color:#000;}
.status-icons{display:flex;gap:5px;align-items:center;}
.content-area{flex:1;overflow:hidden;position:relative;}
.content-area.scroll-mode{overflow-y:auto;}
.content-area.scroll-mode::-webkit-scrollbar{display:none;}
.image-wrapper{position:relative;width:100%;}
.screen-image{width:100%;display:block;user-select:none;-webkit-user-drag:none;}
.hotspot-layer{position:absolute;inset:0;pointer-events:none;}
.hotspot{position:absolute;cursor:pointer;pointer-events:auto;}
.hotspot.normal-mode{background:transparent;border:none;}
.hotspot.admin-mode{background:rgba(30,100,255,.15);border:2px dashed rgba(30,100,255,.75);border-radius:4px;}
.hotspot-label{display:none;position:absolute;top:2px;left:4px;font-size:10px;font-weight:700;color:rgba(20,80,220,.9);white-space:nowrap;pointer-events:none;background:rgba(255,255,255,.8);padding:1px 4px;border-radius:3px;}
.hotspot.admin-mode .hotspot-label{display:block;}
.draw-overlay{display:none;position:absolute;inset:0;cursor:crosshair;z-index:20;}
.draw-overlay.active{display:block;}
.draw-rect{display:none;position:absolute;background:rgba(30,100,255,.2);border:2px solid rgba(30,100,255,.85);border-radius:4px;pointer-events:none;}
.popup-overlay{display:none;position:absolute;inset:0;background:rgba(0,0,0,.55);z-index:30;cursor:pointer;}
.popup-overlay.active{display:flex;align-items:flex-end;}
.popup-image-wrap{width:100%;cursor:auto;position:relative;}
.popup-image-wrap img{width:100%;display:block;}

/* CSS 네비게이션 바 - 안드로이드 스타일 */
.css-navbar{
  flex-shrink:0;height:48px;background:#000;
  display:flex;align-items:center;justify-content:space-around;
  padding:0 24px;
}
.css-navbar button{
  background:none;border:none;cursor:pointer;
  color:#bbb;padding:8px 24px;
  border-radius:6px;transition:background .12s;
  line-height:1;display:flex;align-items:center;justify-content:center;
}
.css-navbar button:hover{background:rgba(255,255,255,.1);}
.css-navbar button:active{background:rgba(255,255,255,.18);}
/* 최근앱 아이콘 (||| 세 줄) */
.nav-recent{display:flex;gap:3px;align-items:center;}
.nav-recent span{display:block;width:2.5px;height:14px;background:#bbb;border-radius:2px;}
/* 홈 아이콘 (○ 원) */
.nav-home{width:20px;height:20px;border:2px solid #bbb;border-radius:50%;}
/* 뒤로 아이콘 (‹ 꺾쇠) */
.nav-back{font-size:28px;font-weight:200;color:#bbb;line-height:1;display:block;margin-top:-2px;}

/* ── PC FRAME (공통) ── */
.pc-area{
  display:none;flex:0 0 66.66vw;align-items:stretch;
  padding:16px;background:#0d0d0f;
}
.pc-area.visible{display:flex;}
.pc-frame{
  flex:1;background:#fff;overflow:hidden;
  display:flex;flex-direction:column;
  box-shadow:0 0 0 1px #333,0 20px 60px rgba(0,0,0,.7);
}

/* ── macOS 스타일 타이틀바 (빽통PC 등) ── */
.pc-frame.mac-frame{border-radius:14px;}
.pc-titlebar{
  flex-shrink:0;height:38px;background:#252528;
  display:flex;align-items:center;padding:0 14px;gap:8px;
  border-bottom:1px solid #3a3a3e;
}
.pc-frame.mac-frame .pc-titlebar{border-radius:14px 14px 0 0;}
.pc-tb-dots{display:flex;gap:6px;}
.pc-tb-dot{width:12px;height:12px;border-radius:50%;}
.pc-tb-dot.red{background:#ff5f57;}
.pc-tb-dot.yellow{background:#ffbd2e;}
.pc-tb-dot.green{background:#28c840;}
.pc-tb-nav{display:flex;gap:6px;margin-left:16px;}
.pc-tb-nav button{background:#3a3a3e;border:none;color:#ccc;font-size:13px;padding:3px 10px;border-radius:5px;cursor:pointer;font-family:inherit;}
.pc-tb-nav button:hover{background:#4a4a4e;color:#fff;}
.pc-tb-title{flex:1;text-align:center;font-size:12px;color:#888;font-weight:500;}

/* ── Chrome 스타일 타이틀바 (채널톡 등) ── */
.pc-frame.chrome-frame{border-radius:8px;}
.chrome-win-bar{
  flex-shrink:0;height:30px;background:#202124;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 0 0 12px;border-radius:8px 8px 0 0;
  user-select:none;
}
.chrome-win-title{font-size:12px;color:#9aa0a6;flex:1;}
.chrome-win-controls{display:flex;height:100%;}
.chrome-win-controls button{
  width:46px;height:100%;background:none;border:none;cursor:pointer;
  color:#9aa0a6;font-size:16px;display:flex;align-items:center;justify-content:center;
  transition:background .1s;line-height:1;
}
.chrome-win-controls button:hover{background:#3c3f43;}
.chrome-win-controls button.win-close:hover{background:#c42b1c;color:#fff;}
.chrome-win-controls button.win-max{font-size:12px;}
.chrome-tabbar{
  flex-shrink:0;height:36px;background:#292a2d;
  display:flex;align-items:flex-end;padding:0 8px;gap:0;
}
.chrome-tab{
  display:flex;align-items:center;gap:7px;
  height:30px;padding:0 12px;border-radius:8px 8px 0 0;
  background:#3c4043;min-width:120px;max-width:240px;
  font-size:12px;color:#e8eaed;cursor:default;flex:1;max-width:200px;
}
.chrome-tab-favicon{width:16px;height:16px;border-radius:3px;background:#0066ff;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.chrome-tab-favicon svg{width:10px;height:10px;}
.chrome-tab-title{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.chrome-tab-close{width:18px;height:18px;border:none;background:none;color:#9aa0a6;cursor:pointer;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.chrome-tab-close:hover{background:#5f6368;color:#e8eaed;}
.chrome-toolbar{
  flex-shrink:0;height:44px;background:#35363a;
  display:flex;align-items:center;padding:0 10px;gap:4px;
  border-bottom:1px solid #5f6368;
}
.chrome-nav-btn{
  width:32px;height:32px;border:none;background:none;cursor:pointer;
  color:#9aa0a6;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:17px;transition:background .1s;flex-shrink:0;
}
.chrome-nav-btn:hover{background:#5f6368;}
.chrome-nav-btn:disabled{color:#5f6368;cursor:default;}
.chrome-nav-btn:disabled:hover{background:none;}
.chrome-address-bar{
  flex:1;height:32px;background:#202124;border-radius:16px;
  display:flex;align-items:center;padding:0 14px;gap:8px;
  border:1px solid transparent;cursor:text;
}
.chrome-address-bar:hover{background:#3c4043;}
.chrome-address-icon{font-size:13px;color:#8ab4f8;}
.chrome-address-text{font-size:13px;color:#e8eaed;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.chrome-menu-btn{
  width:32px;height:32px;border:none;background:none;cursor:default;
  color:#5f6368;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;
}
.chrome-menu-btn:disabled{opacity:.4;cursor:default;}

/* ── PC 공통 콘텐츠 ── */
.pc-content{flex:1;overflow:hidden;position:relative;background:#f0f0f2;}
.pc-image-wrapper{position:relative;width:100%;height:100%;overflow-y:auto;}
.pc-image-wrapper::-webkit-scrollbar{width:6px;}
.pc-image-wrapper::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px;}
.pc-screen-img{width:100%;display:block;}
.pc-hotspot-layer{position:absolute;inset:0;pointer-events:none;}
.pc-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:#888;}
.pc-placeholder .icon{font-size:48px;}
.pc-placeholder .title{font-size:18px;font-weight:700;color:#555;}
.pc-placeholder .sub{font-size:13px;color:#aaa;text-align:center;line-height:1.6;}

/* ── INFO PANEL ── */
.info-panel{flex:1;background:#f0f0f2;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:12px;min-width:260px;}
.panel-card{background:#fff;border-radius:14px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.07);}
.card-title{font-size:11px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;}
.breadcrumb{display:flex;flex-wrap:wrap;gap:3px;align-items:center;font-size:12px;}
.bc-item{color:#555;cursor:pointer;text-decoration:underline;text-underline-offset:2px;}
.bc-sep{color:#ccc;}
.bc-cur{color:var(--brand);font-weight:700;}
.search-box{width:100%;border:1px solid #e5e5e5;border-radius:8px;padding:7px 11px;font-size:13px;font-family:inherit;outline:none;margin-bottom:8px;}
.search-box:focus{border-color:var(--brand);}
.screen-scroll{max-height:200px;overflow-y:auto;}
.screen-scroll::-webkit-scrollbar{width:4px;}
.screen-scroll::-webkit-scrollbar-thumb{background:#ddd;border-radius:2px;}
.screen-btn{display:block;width:100%;text-align:left;padding:6px 10px;border:none;background:none;border-radius:8px;cursor:pointer;font-family:inherit;font-size:13px;color:#333;transition:background .1s;}
.screen-btn:hover{background:#f5f5f5;}
.screen-btn.active{background:#FFF8E0;color:#7a5600;font-weight:700;}
.guide-points{list-style:none;display:flex;flex-direction:column;gap:7px;margin-bottom:10px;}
.guide-points li{font-size:13px;line-height:1.5;padding:8px 10px;background:#FFFBEC;border-radius:8px;border-left:3px solid var(--brand);}
.guide-points li::before{content:'💡 ';}
.guide-caution{font-size:13px;line-height:1.5;padding:8px 10px;background:#FFF0F0;border-radius:8px;border-left:3px solid #FF5555;margin-bottom:8px;}
.guide-caution::before{content:'⚠️ ';}
.guide-kms{font-size:13px;}
.guide-kms::before{content:'🔗 ';}
.guide-kms a{color:#0066CC;text-decoration:none;}
.guide-kms a:hover{text-decoration:underline;}
.guide-empty{color:#bbb;font-size:13px;text-align:center;padding:14px 0;}
.admin-badge{display:inline-block;background:#FF5000;color:#fff;font-size:11px;font-weight:700;padding:2px 8px;border-radius:99px;margin-bottom:12px;}
.admin-section{margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid #f0f0f0;}
.admin-section:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
.section-title{font-size:13px;font-weight:700;color:#444;margin-bottom:8px;}
.btn-row{display:flex;gap:7px;flex-wrap:wrap;}
.btn{padding:7px 13px;border-radius:8px;border:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;transition:opacity .15s;}
.btn:hover{opacity:.82;}
.btn-primary{background:var(--brand);color:#000;}
.btn-danger{background:#FF4444;color:#fff;}
.btn-secondary{background:#eee;color:#333;}
.btn-sm{padding:4px 9px;font-size:12px;}
.form-row{display:flex;flex-direction:column;gap:5px;margin-bottom:9px;}
.form-label{font-size:12px;font-weight:600;color:#666;}
.form-input{width:100%;border:1px solid #e0e0e0;border-radius:8px;padding:7px 10px;font-size:13px;font-family:inherit;outline:none;}
.form-input:focus{border-color:var(--brand);}
select.form-input{background:#fff;}
textarea.form-input{resize:vertical;}
.hs-item{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:#f7f7f7;border-radius:8px;margin-bottom:5px;font-size:13px;}
.unreg-item{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:#FFF8E0;border-radius:8px;margin-bottom:5px;font-size:13px;cursor:pointer;}
.unreg-item:hover{background:#FFEDB0;}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;align-items:center;justify-content:center;}
.modal-bg.active{display:flex;}
.modal{background:#fff;border-radius:16px;padding:24px;min-width:300px;max-width:460px;width:92%;box-shadow:0 10px 40px rgba(0,0,0,.3);}
.modal-title{font-size:16px;font-weight:700;margin-bottom:14px;}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;}
</style>
</head>
<body>

<!-- TOP NAV -->
<nav class="topnav">
  <div class="topnav-logo">화물맨<span>시뮬레이터</span></div>
  <div class="topnav-menus">
    <button class="nav-menu active" data-sim="차주앱" data-type="app">차주 APP</button>
    <button class="nav-menu" data-sim="빽통앱" data-type="app">빽통 APP</button>
    <button class="nav-menu" data-sim="빽통PC" data-type="pc">빽통 PC</button>
    <button class="nav-menu" data-sim="채널톡" data-type="pc">채널톡</button>
  </div>
  <div class="topnav-right">
    <button class="btn-admin-login" id="topAdminBtn">🔐 관리자 로그인</button>
  </div>
</nav>

<!-- MAIN LAYOUT -->
<div class="main-layout">

  <!-- ── PHONE FRAME (APP 모드) ── -->
  <div class="phone-area" id="phoneArea">
  <div class="phone-frame">
  <div class="phone-inner">
    <div class="phone-island"></div>
    <div class="status-bar">
      <span class="status-time" id="statusTime">09:41</span>
      <div class="status-icons">
        <svg width="17" height="12" viewBox="0 0 17 12" fill="#000"><rect x="0" y="5" width="3" height="7" rx="1"/><rect x="4.5" y="3" width="3" height="9" rx="1"/><rect x="9" y="1" width="3" height="11" rx="1"/><rect x="13.5" y="0" width="3" height="12" rx="1" opacity=".25"/></svg>
        <svg width="16" height="12" viewBox="0 0 16 12" fill="#000"><path d="M8 10.5a1.5 1.5 0 110-3 1.5 1.5 0 010 3z"/><path d="M3.5 6.8A6.5 6.5 0 018 5a6.5 6.5 0 014.5 1.8" stroke="#000" stroke-width="1.4" fill="none" stroke-linecap="round"/><path d="M1 4.2A9.8 9.8 0 018 2a9.8 9.8 0 017 2.2" stroke="#000" stroke-width="1.4" fill="none" stroke-linecap="round"/></svg>
        <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x=".75" y=".75" width="21.5" height="10.5" rx="2.5" stroke="#000" stroke-width="1.5"/><rect x="23" y="3.5" width="2" height="5" rx="1" fill="#000"/><rect x="2.5" y="2.5" width="16" height="7" rx="1.5" fill="#000"/></svg>
      </div>
    </div>
    <div class="content-area" id="contentArea">
      <div class="image-wrapper" id="imageWrapper">
        <img class="screen-image" id="screenImg" alt="화면">
        <div class="hotspot-layer" id="hotspotLayer"></div>
        <div class="draw-overlay" id="drawOverlay"><div class="draw-rect" id="drawRect"></div></div>
      </div>
      <div class="popup-overlay" id="popupOverlay">
        <div class="popup-image-wrap" id="popupWrap">
          <img id="popupImg" alt="팝업">
          <div class="hotspot-layer" id="popupHsLayer"></div>
        </div>
      </div>
    </div>
    <!-- Android 네비게이션 바: 최근앱 | 홈 | 뒤로 -->
    <div class="css-navbar" id="cssNavbar">
      <button title="최근앱">
        <div class="nav-recent"><span></span><span></span><span></span></div>
      </button>
      <button onclick="goHome()" title="홈">
        <div class="nav-home"></div>
      </button>
      <button onclick="goBack()" title="뒤로가기">
        <span class="nav-back">‹</span>
      </button>
    </div>
  </div>
  </div>
  </div>

  <!-- ── PC FRAME (PC 모드) ── -->
  <div class="pc-area" id="pcArea">
  <div class="pc-frame mac-frame" id="pcFrame">

    <!-- macOS 타이틀바 (빽통PC 기본) -->
    <div class="pc-titlebar" id="pcTitlebarMac">
      <div class="pc-tb-dots">
        <div class="pc-tb-dot red"></div>
        <div class="pc-tb-dot yellow"></div>
        <div class="pc-tb-dot green"></div>
      </div>
      <div class="pc-tb-nav">
        <button onclick="goBack()">← 뒤로</button>
        <button onclick="goHome()">⌂ 홈</button>
      </div>
      <div class="pc-tb-title" id="pcTitle">빽통 PC 시뮬레이터</div>
    </div>

    <!-- Chrome 타이틀바 (채널톡) -->
    <div id="pcTitlebarChrome" style="display:none">
      <div class="chrome-toolbar">
        <button class="chrome-nav-btn" onclick="goBack()" title="뒤로">&#8592;</button>
        <button class="chrome-nav-btn" disabled title="앞으로">&#8594;</button>
        <div class="chrome-address-bar">
          <span class="chrome-address-icon">🔒</span>
          <span class="chrome-address-text" id="chromeAddressText">channeltalk.io</span>
        </div>
        <button class="chrome-menu-btn" disabled title="Chrome 메뉴">⋮</button>
      </div>
    </div>

    <div class="pc-content" id="pcContent">
      <div class="pc-image-wrapper" id="pcImageWrapper">
        <img class="pc-screen-img" id="pcScreenImg" alt="PC 화면" style="display:none">
        <div class="pc-hotspot-layer" id="pcHotspotLayer"></div>
        <div class="draw-overlay" id="pcDrawOverlay"><div class="draw-rect" id="pcDrawRect"></div></div>
      </div>
      <div class="pc-placeholder" id="pcPlaceholder">
        <div class="icon">🖥️</div>
        <div class="title" id="pcPlaceholderTitle">빽통 PC</div>
        <div class="sub">flow.json을 불러오는 중...</div>
      </div>
    </div>
  </div>
  </div>

  <!-- ── INFO PANEL ── -->
  <div class="info-panel">
    <div class="panel-card">
      <div class="card-title">현재 위치</div>
      <div class="breadcrumb" id="breadcrumb"></div>
    </div>
    <div class="panel-card">
      <div class="card-title">화면 목록</div>
      <input type="text" class="search-box" id="searchBox" placeholder="화면 검색...">
      <div class="screen-scroll" id="screenList"></div>
    </div>
    <div class="panel-card">
      <div class="card-title">상담 가이드</div>
      <div id="guideContent"></div>
    </div>
    <div class="panel-card" id="adminPanel" style="display:none">

      <div class="admin-section">
        <div class="section-title">핫스팟 편집</div>
        <div class="btn-row" style="margin-bottom:8px">
          <button class="btn btn-primary" id="btnDraw">+ 영역 드래그</button>
          <button class="btn btn-secondary" id="btnCancelDraw" style="display:none">취소</button>
        </div>
        <div id="hsList"></div>
      </div>
      <div class="admin-section">
        <div class="section-title">가이드 편집</div>
        <div id="guideEditor"></div>
      </div>
      <div class="admin-section">
        <div class="section-title">화면 추가</div>
        <div class="form-row">
          <div class="form-label">화면 ID</div>
          <input class="form-input" id="newId" placeholder="예: s001_detail">

        <div class="form-row">
          <div class="form-label">라벨명</div>
          <input class="form-input" id="newLabel" placeholder="예: 메인 상세">
        </div>
        <div class="form-row">
          <div class="form-label">이미지 파일명</div>
          <input class="form-input" id="newImage" placeholder="예: 차주앱/파일명.jpg">

          <div class="form-label">타입</div>
          <select class="form-input" id="newType">
            <option value="normal">normal</option>
            <option value="scroll">scroll</option>
            <option value="popup">popup</option>
          </select>

        <div class="form-row" style="flex-direction:row;align-items:center;gap:8px">

          <label for="newNavbar" style="font-size:13px">navbar 표시</label>

      </div>
      <div class="admin-section">
        <div class="section-title">내보내기</div>
        <button class="btn btn-primary" id="btnExport">📥 flow.json 다운로드</button>
      </div>

    <div class="panel-card" id="unregCard" style="display:none">
      <div class="card-title">⚠️ 미등록 이미지</div>
      <div id="unregList"></div>
    </div>
  </div>

</div><!-- /main-layout -->

<!-- 비밀번호 모달 -->
<div class="modal-bg" id="pwModal">
  <div class="modal">
    <div class="modal-title">🔐 관리자 비밀번호</div>
    <div class="form-row"><input type="password" class="form-input" id="pwInput" placeholder="비밀번호"></div>
    <p id="pwErr" style="color:#f44;font-size:13px;display:none">비밀번호가 올바르지 않습니다.</p>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('pwModal')">취소</button>
      <button class="btn btn-primary" onclick="submitPw()">확인</button>
    </div>
  </div>
</div>

<!-- 핫스팟 모달 -->
<div class="modal-bg" id="hsModal">
  <div class="modal">
    <div class="modal-title">핫스팟 설정</div>
    <div class="form-row">
      <div class="form-label">라벨</div>
      <input class="form-input" id="hsLabelInput" placeholder="예: 로그인 버튼">
    </div>
    <div class="form-row">
      <div class="form-label">이동할 화면</div>
      <select class="form-input" id="hsGoto"></select>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="cancelDraw()">취소</button>
      <button class="btn btn-primary" onclick="confirmHs()">추가</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
// SECTION CONFIG
// ═══════════════════════════════════════════
const SECS = {
  '차주앱': { type:'app', flowUrl:'차주앱/flow.json' },
  '빽통앱': { type:'app', flowUrl:'빽통앱/flow.json' },
  '빽통PC': { type:'pc',  frame:'mac',    flowUrl:'빽통PC/flow.json', title:'빽통 PC 시뮬레이터' },
  '채널톡': { type:'pc',  frame:'chrome', flowUrl:'채널톡/flow.json', title:'채널톡', address:'channeltalk.io' },
};

// Per-section state cache
const cache = {};
Object.keys(SECS).forEach(k => { cache[k] = { flow:null, cur:null, hist:[] }; });

let activeSec = '차주앱';
let adminMode = false;
let drawing = false, drawStart = null, pendingHs = null;
let activeDrawOverlayId = null; // 'drawOverlay' or 'pcDrawOverlay'

// ═══════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════
async function boot() {
  tick(); setInterval(tick, 1000);

  // Nav switching
  document.querySelectorAll('.nav-menu').forEach(btn => {
    btn.addEventListener('click', () => switchSec(btn.dataset.sim));
  });

  // Admin button
  document.getElementById('topAdminBtn').addEventListener('click', () => {
    if(adminMode) exitAdmin();
    else { openModal('pwModal'); setTimeout(()=>document.getElementById('pwInput').focus(), 60); }
  });

  document.getElementById('pwInput').onkeydown = e => { if(e.key==='Enter') submitPw(); };
  document.getElementById('btnDraw').onclick = startDraw;
  document.getElementById('btnCancelDraw').onclick = cancelDraw;
  document.getElementById('btnAddScreen').onclick = addScreen;
  document.getElementById('btnExport').onclick = exportFlow;
  document.getElementById('searchBox').oninput = renderList;
  document.getElementById('popupOverlay').onclick = function(e) { if(e.target===this) closePopup(); };
  document.querySelectorAll('.modal-bg').forEach(el => {
    el.addEventListener('click', e => { if(e.target===el) closeModal(el.id); });
  });

  setupDrawEvents('drawOverlay', 'drawRect');
  setupDrawEvents('pcDrawOverlay', 'pcDrawRect');

  // Load first section
  await loadSec('차주앱');
  applySec('차주앱');
}

// ═══════════════════════════════════════════
// SECTION SWITCHING
// ═══════════════════════════════════════════
async function switchSec(name) {
  if(name === activeSec) return;
  if(drawing) cancelDraw();

  activeSec = name;
  document.querySelectorAll('.nav-menu').forEach(b => b.classList.toggle('active', b.dataset.sim===name));

  await loadSec(name);
  applySec(name);
}

async function loadSec(name) {
  if(cache[name].flow) return; // already loaded
  try {
    const r = await fetch(SECS[name].flowUrl + '?_=' + Date.now());
    cache[name].flow = await r.json();
    if(!cache[name].cur) cache[name].cur = cache[name].flow.start;
  } catch(e) {
    cache[name].flow = { imageManifest:[], screens:{}, start:null };
    console.warn('flow.json 로드 실패:', name, e);
  }
}

function applySec(name) {
  const sec = SECS[name];
  const st = cache[name];

  // Phone vs PC 표시
  document.getElementById('phoneArea').style.display = sec.type==='app' ? '' : 'none';
  document.getElementById('pcArea').classList.toggle('visible', sec.type==='pc');

  if(sec.type === 'pc') {
    const isChrome = sec.frame === 'chrome';
    const pcFrame = document.getElementById('pcFrame');
    pcFrame.className = isChrome ? 'pc-frame chrome-frame' : 'pc-frame mac-frame';
    document.getElementById('pcTitlebarMac').style.display = isChrome ? 'none' : '';
    document.getElementById('pcTitlebarChrome').style.display = isChrome ? '' : 'none';
    if(isChrome) {
      document.getElementById('chromeWinTitle').textContent = (sec.title||name) + ' - Google Chrome';
      document.getElementById('chromeTabTitle').textContent = sec.title||name;
      document.getElementById('chromeAddressText').textContent = sec.address || 'channeltalk.io';
    } else {
      document.getElementById('pcTitle').textContent = sec.title||name;
    }
    document.getElementById('pcPlaceholderTitle').textContent = sec.title||name;
  }

  if(st.cur && st.flow.screens[st.cur]) {
    renderScreen(name, st.cur);
  } else if(st.flow.start && st.flow.screens[st.flow.start]) {
    st.cur = st.flow.start;
    renderScreen(name, st.cur);
  } else {
    showPcPlaceholder(true);
  }

  renderBreadcrumb();
  renderList();
  renderGuide(st.flow.screens?.[st.cur]?.guide);
  detectUnreg();
  if(adminMode) { renderHsList(); renderGuideEditor(); }
}

// ═══════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════
function goTo(id, init=false) {
  const st = cache[activeSec];
  const scr = st.flow.screens[id];
  if(!scr) return;

  if(scr.type==='popup' && !init) { showPopup(id); return; }
  if(!init && st.cur) st.hist.push(st.cur);
  st.cur = id;

  renderScreen(activeSec, id);
  renderBreadcrumb();
  renderGuide(scr.guide);
  renderList();
  if(adminMode) { renderHsList(); renderGuideEditor(); }
}

function goBack() {
  if(document.getElementById('popupOverlay').classList.contains('active')) { closePopup(); return; }
  const st = cache[activeSec];
  if(st.hist.length > 0) {
    st.cur = st.hist.pop();
    renderScreen(activeSec, st.cur);
    renderBreadcrumb();
    renderGuide(st.flow.screens[st.cur]?.guide);
    renderList();
    if(adminMode) { renderHsList(); renderGuideEditor(); }
  }
}

function goHome() {
  closePopup();
  const st = cache[activeSec];
  st.hist = [];
  st.cur = st.flow.start;
  renderScreen(activeSec, st.cur);
  renderBreadcrumb();
  renderGuide(st.flow.screens[st.cur]?.guide);
  renderList();
}

function jumpHist(idx) {
  const st = cache[activeSec];
  const path = [...st.hist, st.cur];
  st.hist = path.slice(0, idx);
  st.cur = path[idx];
  renderScreen(activeSec, st.cur);
  renderBreadcrumb();
  renderGuide(st.flow.screens[st.cur]?.guide);
  renderList();
}

// ═══════════════════════════════════════════
// RENDER SCREEN
// ═══════════════════════════════════════════
function renderScreen(secName, id) {
  const sec = SECS[secName];
  const scr = cache[secName].flow.screens[id];
  if(!scr) return;

  if(sec.type === 'app') {
    renderPhoneScreen(scr);
  } else {
    renderPcScreen(scr);
  }
}

function renderPhoneScreen(scr) {
  const ca = document.getElementById('contentArea');
  const img = document.getElementById('screenImg');
  const nb = document.getElementById('cssNavbar');

  ca.classList.toggle('scroll-mode', scr.type==='scroll');
  ca.scrollTop = 0;
  img.src = '';
  img.onload = () => renderHotspots('hotspotLayer', scr.hotspots||[], false);
  img.onerror = () => console.warn('이미지 로드 실패:', scr.image);
  img.src = scr.image;
  nb.style.display = scr.show_navbar===false ? 'none' : 'flex';
  if(!drawing) document.getElementById('drawOverlay').classList.remove('active');
}

function renderPcScreen(scr) {
  const img = document.getElementById('pcScreenImg');
  const placeholder = document.getElementById('pcPlaceholder');
  const wrapper = document.getElementById('pcImageWrapper');

  // placeholder 숨기고 img도 숨긴 채로 시작 (showPcPlaceholder 미사용)
  placeholder.style.display = 'none';
  img.style.display = 'none';
  img.src = '';
  wrapper.scrollTop = 0;

  const targetSrc = scr.image;
  img.onload = () => {
    img.style.display = 'block';
    renderHotspots('pcHotspotLayer', scr.hotspots||[], false);
  };
  img.onerror = () => {
    img.style.display = 'none';
    console.warn('이미지 로드 실패:', targetSrc);
  };
  img.src = targetSrc;
  if(!drawing) document.getElementById('pcDrawOverlay').classList.remove('active');
}

function showPcPlaceholder(show) {
  document.getElementById('pcPlaceholder').style.display = show ? 'flex' : 'none';
  document.getElementById('pcScreenImg').style.display = show ? 'none' : 'block';
}

// ═══════════════════════════════════════════
// HOTSPOTS
// ═══════════════════════════════════════════
function renderHotspots(layerId, hotspots, forceAdmin) {
  const layer = document.getElementById(layerId);
  layer.innerHTML = '';
  const isAdmin = forceAdmin || adminMode;
  hotspots.forEach((hs, i) => {
    const el = document.createElement('div');
    el.className = 'hotspot ' + (isAdmin ? 'admin-mode' : 'normal-mode');
    el.style.cssText = `top:${hs.top}%;left:${hs.left}%;width:${hs.width}%;height:${hs.height}%;`;
    const lbl = document.createElement('span');
    lbl.className = 'hotspot-label';
    lbl.textContent = (hs.label||'') + ' → ' + hs.goto;
    el.appendChild(lbl);
    if(isAdmin) {
      el.addEventListener('click', e => {
        e.stopPropagation();
        if(confirm(`핫스팟 "${hs.label||hs.goto}" 을(를) 삭제하시겠습니까?`)) {
          const st = cache[activeSec];
          st.flow.screens[st.cur].hotspots.splice(i,1);
          renderHotspots(layerId, st.flow.screens[st.cur].hotspots, false);
          renderHsList();
        }
      });
    } else {
      el.addEventListener('click', () => hs.goto && goTo(hs.goto));
    }
    layer.appendChild(el);
  });
}

// ═══════════════════════════════════════════
// POPUP
// ═══════════════════════════════════════════
function showPopup(id) {
  const scr = cache[activeSec].flow.screens[id];
  const img = document.getElementById('popupImg');
  img.src = scr.image;
  img.onload = () => renderHotspots('popupHsLayer', scr.hotspots||[], false);
  document.getElementById('popupOverlay').classList.add('active');
}
function closePopup() {
  document.getElementById('popupOverlay').classList.remove('active');
}

// ═══════════════════════════════════════════
// BREADCRUMB
// ═══════════════════════════════════════════
function renderBreadcrumb() {
  const st = cache[activeSec];
  const el = document.getElementById('breadcrumb');
  const path = [...st.hist, st.cur].filter(Boolean);
  el.innerHTML = path.map((id,i) => {
    const scr = st.flow.screens?.[id];
    const lbl = scr ? scr.label : id;
    if(i===path.length-1) return `<span class="bc-cur">${esc(lbl)}</span>`;
    return `<span class="bc-item" onclick="jumpHist(${i})">${esc(lbl)}</span><span class="bc-sep"> › </span>`;
  }).join('');
}

// ═══════════════════════════════════════════
// SCREEN LIST
// ═══════════════════════════════════════════
function renderList() {
  const q = document.getElementById('searchBox').value.toLowerCase();
  const el = document.getElementById('screenList');
  const st = cache[activeSec];
  el.innerHTML = '';
  if(!st.flow.screens) return;
  Object.entries(st.flow.screens).forEach(([id, scr]) => {
    if(q && !scr.label.toLowerCase().includes(q) && !id.includes(q)) return;
    const btn = document.createElement('button');
    btn.className = 'screen-btn' + (id===st.cur?' active':'');
    btn.textContent = scr.label;
    btn.title = id;
    btn.onclick = () => { cache[activeSec].hist=[]; goTo(id,true); };
    el.appendChild(btn);
  });
}

// ═══════════════════════════════════════════
// GUIDE
// ═══════════════════════════════════════════
function renderGuide(g) {
  const el = document.getElementById('guideContent');
  if(!g) { el.innerHTML = '<div class="guide-empty">가이드 없음</div>'; return; }
  let html = '';
  if(g.points?.length) html += '<ul class="guide-points">' + g.points.map(p=>`<li>${esc(p)}</li>`).join('') + '</ul>';
  if(g.caution) html += `<div class="guide-caution">${esc(g.caution)}</div>`;
  if(g.kms_link) html += `<div class="guide-kms"><a href="${esc(g.kms_link)}" target="_blank">KMS 바로가기</a></div>`;
  if(!html) html = '<div class="guide-empty">등록된 가이드가 없습니다.<br><small style="color:#ccc">관리자 모드에서 추가하세요.</small></div>';
  el.innerHTML = html;
}

// ═══════════════════════════════════════════
// CLOCK
// ═══════════════════════════════════════════
function tick() {
  const d = new Date();
  document.getElementById('statusTime').textContent =
    String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}

// ═══════════════════════════════════════════
// ADMIN
// ═══════════════════════════════════════════
function submitPw() {
  if(document.getElementById('pwInput').value === 'hmm0424!') {
    document.getElementById('pwInput').value = '';
    closeModal('pwModal');
    enterAdmin();
  } else {
    document.getElementById('pwErr').style.display = 'block';
    document.getElementById('pwInput').value = '';
    document.getElementById('pwInput').focus();
  }
}

function enterAdmin() {
  adminMode = true;
  document.getElementById('adminPanel').style.display = 'block';
  document.getElementById('topAdminBtn').classList.add('on');
  document.getElementById('topAdminBtn').textContent = '🔓 관리자 모드 ON';
  const st = cache[activeSec];
  const layerId = SECS[activeSec].type==='pc' ? 'pcHotspotLayer' : 'hotspotLayer';
  renderHotspots(layerId, st.flow.screens?.[st.cur]?.hotspots||[], true);
  renderHsList();
  renderGuideEditor();
}

function exitAdmin() {
  adminMode = false;
  if(drawing) cancelDraw();
  document.getElementById('adminPanel').style.display = 'none';
  document.getElementById('topAdminBtn').classList.remove('on');
  document.getElementById('topAdminBtn').textContent = '🔐 관리자 로그인';
  const st = cache[activeSec];
  const layerId = SECS[activeSec].type==='pc' ? 'pcHotspotLayer' : 'hotspotLayer';
  renderHotspots(layerId, st.flow.screens?.[st.cur]?.hotspots||[], false);
}

function renderHsList() {
  const st = cache[activeSec];
  const hs = st.flow.screens?.[st.cur]?.hotspots || [];
  const el = document.getElementById('hsList');
  if(!hs.length) { el.innerHTML = '<div style="color:#aaa;font-size:13px;margin-bottom:6px">등록된 핫스팟 없음</div>'; return; }
  el.innerHTML = hs.map((h,i) => `
    <div class="hs-item">
      <span>${esc(h.label||'(없음)')} → ${esc(h.goto)}</span>
      <button class="btn btn-danger btn-sm" onclick="delHs(${i})">삭제</button>
    </div>`).join('');
}

function delHs(i) {
  const st = cache[activeSec];
  st.flow.screens[st.cur].hotspots.splice(i,1);
  const layerId = SECS[activeSec].type==='pc' ? 'pcHotspotLayer' : 'hotspotLayer';
  renderHotspots(layerId, st.flow.screens[st.cur].hotspots, true);
  renderHsList();
}

function renderGuideEditor() {
  const st = cache[activeSec];
  const g = st.flow.screens?.[st.cur]?.guide || {points:[],caution:'',kms_link:''};
  document.getElementById('guideEditor').innerHTML = `
    <div class="form-row">
      <div class="form-label">💡 상담 포인트 (한 줄에 하나)</div>
      <textarea class="form-input" id="editPoints" rows="4">${esc((g.points||[]).join('\n'))}</textarea>
    </div>
    <div class="form-row">
      <div class="form-label">⚠️ 주의사항</div>
      <input class="form-input" id="editCaution" value="${esc(g.caution||'')}">
    </div>
    <div class="form-row">
      <div class="form-label">🔗 KMS 링크</div>
      <input class="form-input" id="editKms" value="${esc(g.kms_link||'')}">
    </div>
    <button class="btn btn-primary btn-sm" onclick="saveGuide()">저장</button>
  `;
}

function saveGuide() {
  const st = cache[activeSec];
  st.flow.screens[st.cur].guide = {
    points: document.getElementById('editPoints').value.split('\n').map(s=>s.trim()).filter(Boolean),
    caution: document.getElementById('editCaution').value.trim(),
    kms_link: document.getElementById('editKms').value.trim(),
  };
  renderGuide(st.flow.screens[st.cur].guide);
  const btn = document.querySelector('#guideEditor .btn');
  btn.textContent = '✓ 저장됨!';
  setTimeout(()=>btn.textContent='저장', 1500);
}

function addScreen() {
  const id = document.getElementById('newId').value.trim();
  const label = document.getElementById('newLabel').value.trim();
  const image = document.getElementById('newImage').value.trim();
  const type = document.getElementById('newType').value;
  const showNav = document.getElementById('newNavbar').checked;
  if(!id||!label||!image) { alert('ID, 라벨, 이미지 파일명을 모두 입력하세요.'); return; }
  const st = cache[activeSec];
  if(st.flow.screens[id]) { alert(`"${id}" ID가 이미 존재합니다.`); return; }
  st.flow.screens[id] = { label, image, type, show_navbar:showNav, hotspots:[], guide:{points:[],caution:'',kms_link:''} };
  ['newId','newLabel','newImage'].forEach(i=>document.getElementById(i).value='');
  renderList(); detectUnreg();
  alert(`"${label}" 화면이 추가되었습니다.`);
}

function exportFlow() {
  const st = cache[activeSec];
  const blob = new Blob([JSON.stringify(st.flow, null, 2)], {type:'application/json'});
  const a = Object.assign(document.createElement('a'), {href:URL.createObjectURL(blob), download:`${activeSec}-flow.json`});
  a.click(); URL.revokeObjectURL(a.href);
}

// ═══════════════════════════════════════════
// DRAW (hotspot creation)
// ═══════════════════════════════════════════
function setupDrawEvents(overlayId, rectId) {
  const overlay = document.getElementById(overlayId);
  const rect = document.getElementById(rectId);
  let isDown = false;

  overlay.addEventListener('mousedown', e => {
    if(!drawing || activeDrawOverlayId !== overlayId) return;
    isDown = true;
    const b = overlay.getBoundingClientRect();
    drawStart = { x: e.clientX - b.left, y: e.clientY - b.top };
    rect.style.cssText = `display:block;left:${drawStart.x}px;top:${drawStart.y}px;width:0;height:0;`;
  });

  overlay.addEventListener('mousemove', e => {
    if(!isDown || !drawStart) return;
    const b = overlay.getBoundingClientRect();
    const cx=e.clientX-b.left, cy=e.clientY-b.top;
    const l=Math.min(cx,drawStart.x), t=Math.min(cy,drawStart.y);
    const w=Math.abs(cx-drawStart.x), h=Math.abs(cy-drawStart.y);
    rect.style.cssText = `display:block;left:${l}px;top:${t}px;width:${w}px;height:${h}px;`;
  });

  overlay.addEventListener('mouseup', e => {
    if(!isDown || !drawStart) return;
    isDown = false;
    const b = overlay.getBoundingClientRect();
    const cx=e.clientX-b.left, cy=e.clientY-b.top;
    const l=Math.min(cx,drawStart.x), t=Math.min(cy,drawStart.y);
    const w=Math.abs(cx-drawStart.x), h=Math.abs(cy-drawStart.y);
    drawStart = null;
    if(w<10||h<6) return;
    pendingHs = {
      top: round1(t/b.height*100), left: round1(l/b.width*100),
      width: round1(w/b.width*100), height: round1(h/b.height*100),
    };
    const sel = document.getElementById('hsGoto');
    const st = cache[activeSec];
    sel.innerHTML = Object.entries(st.flow.screens)
      .map(([id,s]) => `<option value="${esc(id)}">${esc(s.label)} (${esc(id)})</option>`).join('');
    document.getElementById('hsLabelInput').value = '';
    openModal('hsModal');
  });
}

function startDraw() {
  drawing = true;
  activeDrawOverlayId = SECS[activeSec].type==='pc' ? 'pcDrawOverlay' : 'drawOverlay';
  document.getElementById(activeDrawOverlayId).classList.add('active');
  document.getElementById('btnDraw').style.display = 'none';
  document.getElementById('btnCancelDraw').style.display = 'inline-block';
}

function cancelDraw() {
  drawing = false; drawStart = null; pendingHs = null;
  ['drawOverlay','pcDrawOverlay'].forEach(id => document.getElementById(id).classList.remove('active'));
  ['drawRect','pcDrawRect'].forEach(id => document.getElementById(id).style.display = 'none');
  document.getElementById('btnDraw').style.display = 'inline-block';
  document.getElementById('btnCancelDraw').style.display = 'none';
  closeModal('hsModal');
}

function confirmHs() {
  if(!pendingHs) return;
  const goto = document.getElementById('hsGoto').value;
  const label = document.getElementById('hsLabelInput').value.trim() || goto;
  const st = cache[activeSec];
  if(!st.flow.screens[st.cur].hotspots) st.flow.screens[st.cur].hotspots = [];
  st.flow.screens[st.cur].hotspots.push({ label, ...pendingHs, goto });
  pendingHs = null;
  cancelDraw();
  const layerId = SECS[activeSec].type==='pc' ? 'pcHotspotLayer' : 'hotspotLayer';
  renderHotspots(layerId, st.flow.screens[st.cur].hotspots, true);
  renderHsList();
}

// ═══════════════════════════════════════════
// UNREGISTERED IMAGES
// ═══════════════════════════════════════════
function detectUnreg() {
  const st = cache[activeSec];
  const manifest = st.flow.imageManifest || [];
  const used = new Set(Object.values(st.flow.screens||{}).map(s=>s.image));
  const unreg = manifest.filter(f => !used.has(f));
  const card = document.getElementById('unregCard');
  if(!unreg.length) { card.style.display='none'; return; }
  card.style.display = 'block';
  document.getElementById('unregList').innerHTML = unreg.map(f => `
    <div class="unreg-item" onclick="quickReg('${esc(f)}')">
      <span>${esc(f)}</span><small style="color:#888">클릭하여 등록</small>
    </div>`).join('');
}

function quickReg(filename) {
  if(!adminMode) { alert('관리자 모드에서 등록할 수 있습니다.'); return; }
  const label = filename.replace(/^[^/]+\//,'').replace(/\.(jpg|jpeg|png|webp)$/i,'').replace(/_/g,' ');
  const id = activeSec.replace(' ','') + '_' + label.toLowerCase().replace(/\s+/g,'_').replace(/[^\w가-힣]/g,'').slice(0,20);
  document.getElementById('newImage').value = filename;
  document.getElementById('newLabel').value = label;
  document.getElementById('newId').value = id;
  document.getElementById('adminPanel').scrollIntoView({behavior:'smooth'});
}

// ═══════════════════════════════════════════
// MODAL
// ═══════════════════════════════════════════
function openModal(id) {
  document.getElementById(id).classList.add('active');
  if(id==='pwModal') document.getElementById('pwErr').style.display='none';
}
function closeModal(id) { document.getElementById(id).classList.remove('active'); }

// ═══════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function round1(n) { return Math.round(n*10)/10; }

boot();
</script>
